spring.application.name=springbootProject


spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/distributed-storage}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password_placeholder}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


jwt.secret=${JWT_SECRET:my_temporary_local_secret_key}
jwt.expiration=${JWT_EXPIRATION:86400000}


spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB